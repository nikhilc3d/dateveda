<!DOCTYPE html>
<html>
<head>
<title>LinkedIn Login</title>

<style>
body{
font-family:Arial;
background:#f5f7fb;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

button{
background:#0A66C2;
color:white;
border:none;
padding:14px 22px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Sign in</h2>
<button onclick="login()">Sign in with LinkedIn</button>
</div>

<script>

function login(){

const client_id="YOUR_CLIENT_ID"

const redirect_uri=window.location.origin+"/api/callback"

const url=
"https://www.linkedin.com/oauth/v2/authorization"+
"?response_type=code"+
"&client_id="+client_id+
"&redirect_uri="+encodeURIComponent(redirect_uri)+
"&scope=openid%20profile%20email"

window.location.href=url

}

</script>

</body>
</html>
